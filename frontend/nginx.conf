# Delete everything else and ONLY keep this in your file:
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html; # Good for single page apps (React/Vite)
    }

    # Keep your /api/ reverse proxy block here if you have one
}
