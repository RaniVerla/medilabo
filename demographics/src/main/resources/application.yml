spring:
     application:
          name: DemographicsApplication
     datasource:
         url: jdbc:postgresql://localhost:5432/patientdb
         username: postgres
         password: admin
     jpa:
       hibernate:
         ddl-auto: none
       properties:
         hibernate:
           default_schema: patient
       show-sql: true
     liquibase:
       enabled: true
       change-log: classpath:liquibase/db.changelog-master.yaml
       default-schema: patient


server.port : 8081