databaseChangeLog:

  - changeSet:
      id: 002
      author: rani

      changes:

        - createTable:
            schemaName: patient
            tableName: Patient_information

            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: date_of_birth
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: gender
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: address
                  type: VARCHAR(255)

              - column:
                  name: phone
                  type: VARCHAR(20)