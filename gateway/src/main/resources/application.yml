server:
  port: 8080

spring:
  application:
    name: patient-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: demographics-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/patients/**

            - id: patient-history-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v2/patients/**

            - id: assessment-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v3/assessments/**
    globalcors:
      cors-configurations:
        '[/**]':
          allowedOrigins:
            - "http://localhost:5173"
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowedHeaders:
            - "*"
          allowCredentials: true


management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info


logging:
  level:
    org.springframework.security: TRACE
    org.springframework.cloud.gateway: DEBUG